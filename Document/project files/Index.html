<!DOCTYPE html>
<html>
<head>
    <title>Liver Disease Prediction</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f7fc;
            margin: 0;
            padding: 30px;
        }

        .container {
            max-width: 700px;
            margin: auto;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0px 2px 15px rgba(0,0,0,0.1);
        }

        h1 {
            text-align: center;
        }

        input, select, button {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            margin-bottom: 15px;
            border-radius: 8px;
            border: 1px solid #ccc;
            box-sizing: border-box;
        }

        button {
            cursor: pointer;
            font-size: 16px;
        }

        .result {
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            background: #eef7ee;
        }

        .error {
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            background: #ffeaea;
        }
    </style>
</head>

<body>

<div class="container">

    <h1>🏥 Liver Disease Prediction System</h1>

    <form action="/predict" method="POST">

        <input type="number"
               name="Age"
               step="1"
               min="1"
               placeholder="Age"
               value="{{ form.Age if form else '' }}"
               required>

        <select name="Gender" required>
            <option value="">Select Gender</option>

            <option value="1"
            {% if form and form.Gender=='1' %}
            selected
            {% endif %}>
                Male
            </option>

            <option value="0"
            {% if form and form.Gender=='0' %}
            selected
            {% endif %}>
                Female
            </option>
        </select>

        <input type="number" step="0.01" name="Total_Bilirubin"
               placeholder="Total Bilirubin"
               value="{{ form.Total_Bilirubin if form else '' }}"
               required>

        <input type="number" step="0.01" name="Direct_Bilirubin"
               placeholder="Direct Bilirubin"
               value="{{ form.Direct_Bilirubin if form else '' }}"
               required>

        <input type="number" step="0.01" name="Alkaline_Phosphotase"
               placeholder="Alkaline Phosphotase"
               value="{{ form.Alkaline_Phosphotase if form else '' }}"
               required>

        <input type="number" step="0.01" name="Alamine_Aminotransferase"
               placeholder="Alamine Aminotransferase"
               value="{{ form.Alamine_Aminotransferase if form else '' }}"
               required>

        <input type="number" step="0.01" name="Aspartate_Aminotransferase"
               placeholder="Aspartate Aminotransferase"
               value="{{ form.Aspartate_Aminotransferase if form else '' }}"
               required>

        <input type="number" step="0.01" name="Total_Protiens"
               placeholder="Total Proteins"
               value="{{ form.Total_Protiens if form else '' }}"
               required>

        <input type="number" step="0.01" name="Albumin"
               placeholder="Albumin"
               value="{{ form.Albumin if form else '' }}"
               required>

        <input type="number" step="0.01"
               name="Albumin_and_Globulin_Ratio"
               placeholder="Albumin and Globulin Ratio"
               value="{{ form.Albumin_and_Globulin_Ratio if form else '' }}"
               required>

        <button type="submit">
            Predict
        </button>

    </form>

    {% if prediction %}
    <div class="result">
        <h3>{{ prediction }}</h3>
    </div>
    {% endif %}

    {% if error %}
    <div class="error">
        <h3>{{ error }}</h3>
    </div>
    {% endif %}

</div>

</body>
</html>
